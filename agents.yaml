      prompt: "定时唤醒：请测试 VM MCP 工具。1) 用 get_inbox 检查未读消息 2) 用 list_tickets 检查待办任务 3) 选择一个使用场景（网上购物调研、制作 PPT、写代码部署网站、文件管理等），直接使用 VM MCP 的 MCP tools 进行测试 4) 发现问题后创建 ticket 给 product-lisa。"
  founder-noah:
    project: founder
    work_stream: founder
    template: founder
    role: 创业者
    description: 发现商业机会、规划可盈利项目、驱动从 0 到 1
    dispatchable: true
