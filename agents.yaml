# Workspace: root directory for external project repos.
# Agents reference projects as ${WORKSPACE_DIR}/project-name.
# Set WORKSPACE_DIR in .env (default: ~/workspace).
workspace_dir: ${WORKSPACE_DIR:-~/workspace}

tmux_session: agents

# Project ID used by the built-in task database.
project_id: 3

# Daemon config: central agents-mcp process that all agents connect to via proxy.
# Start daemon: uv run --directory services/agents-mcp agents-mcp --daemon --port 8765
daemon:
  host: ${DAEMON_HOST:-127.0.0.1}
  port: 8765

# MCP servers spawned per-agent by Claude Code.
# In daemon mode, agents use the proxy to connect to the central daemon.
# In direct mode (daemon not configured), agents spawn the full server.
mcp_servers:
  agents:
    command: uv
    args:
      - run
      - --directory
      - "{ROOT_DIR}/services/agents-mcp"
      - agents-mcp-proxy
  agent-hub:
    command: "${WORKSPACE_DIR}/vm-mcp/.venv/bin/python"
    args:
      - "-m"
      - agent_hub
    env:
      VMWARE_API_URL: ${VMWARE_API_URL:-http://localhost:8697}
      VMWARE_USERNAME: ${VMWARE_USERNAME}
      VMWARE_PASSWORD: ${VMWARE_PASSWORD}
      SSH_KEY_PATH: ${SSH_KEY_PATH:-~/.ssh/id_ed25519}
      SSH_USERNAME: ${SSH_USERNAME:-root}
  1password:
    command: npx
    args:
      - "-y"
      - "@takescake/1password-mcp"
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN}
  microsoft:
    command: uv
    args:
      - "--directory"
      - "${WORKSPACE_DIR}/microsoft-mcp"
      - run
      - microsoft-mcp
    env:
      MICROSOFT_MCP_CLIENT_ID: ${MICROSOFT_MCP_CLIENT_ID:-441b3624-2687-4a47-adfc-608e94d17f41}
# Daily journal: all agents write a work summary at the configured time.
# Stagger avoids dispatching all agents simultaneously.
daily_journal:
  time: "01:00"
  stagger_minutes: 5

# Staleness detection: when an agent is idle but has in_progress tickets
# older than threshold, dispatch with a targeted message to complete delivery.
staleness:
  threshold_minutes: 30

# ═══════════════════════════════════════════════
# V2 Configuration (task-driven, ephemeral agents)
# ═══════════════════════════════════════════════

# V2 dispatcher: set enabled=true to use task-driven dispatch instead of agent-polling.
# During migration, v1 and v2 can coexist (v1 handles dispatchable agents, v2 handles tasks).
v2:
  enabled: true  # activated 2026-04-12 for end-to-end testing
  max_concurrent_sessions: 4
  session_idle_timeout: 300  # seconds before idle session is released

# Agent types: template definitions for v2 ephemeral agents.
# Each type has a system prompt in templates/v2/<type>.md
agent_types:
  development:
    description: Full product lifecycle — planning, implementation, testing, delivery
    prompt_template: templates/v2/development.md
    mcp_servers: [agents]
  operations:
    description: System health, infrastructure, configuration, monitoring
    prompt_template: templates/v2/operations.md
    mcp_servers: [agents, 1password]
  assistant:
    description: Personal tasks, research, errands, email/calendar
    prompt_template: templates/v2/assistant.md
    mcp_servers: [agents, microsoft]

# ═══════════════════════════════════════════════
# PR Monitor: auto-close tickets when linked PRs merge (ticket #487)
# ═══════════════════════════════════════════════
#
# Polls `gh pr list` every `interval_seconds` for merged PRs in the listed
# repos. When a merged PR references `#NNN` in its title/body, the matching
# ticket is transitioned to status=0 (Done) with a comment. If the ticket
# has open children, the close is skipped and admin is flagged instead.
pr_monitor:
  enabled: true
  interval_seconds: 600      # check every 10 minutes
  lookback_days: 7           # only reconcile PRs merged in the last N days
  repos:
    - dragonghy/agents
    # Add trading once it has a GitHub origin:
    # - dragonghy/trading

# Project definitions: each project specifies its context and resource config.
projects:
  agent-hub:
    path: .  # relative to repo root
    description: The Agent Harness platform itself
    priority: critical
    tags: [harness, platform]
  # Frozen projects (uncomment when ready to re-enable):
  # wedding-website:
  #   path: ${WORKSPACE_DIR}/wedding-website
  #   description: Wedding invitation and photo site (deadline May 23)
  #   priority: high
  #   deadline: "2026-05-23"
  # seopilot:
  #   path: ${WORKSPACE_DIR}/seopilot
  #   description: Shopify AI SEO App
  #   priority: medium
  # devtoolbox:
  #   path: ${WORKSPACE_DIR}/devtoolbox
  #   description: Free online developer tools
  #   priority: low

# ═══════════════════════════════════════════════
# V1 Agent Definitions (legacy, being phased out)
# ═══════════════════════════════════════════════
#
# These persistent v1 agents remain in service while v2 task-driven sessions
# take over the rest of the team. Only admin and ops are still required.
# dev-alex and qa-lucy are kept temporarily for in-flight work; they will be
# retired once v2 development sessions cover their workflows.
agents:
  admin:
    project: agents
    work_stream: admin
    role: 管理员
    description: 负责全局配置、Skill 管理和 Agent 重启
    dispatchable: true
    add_dirs:
      - .
  ops:
    project: agents
    work_stream: ops
    role: 运维工程师
    description: 负责域名、服务器、云资源和基础设施操作
    dispatchable: true
    add_dirs:
      - .
    extra_mcp_servers:
      1password:
        command: npx
        args:
          - "-y"
          - "@takescake/1password-mcp"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${OPS_1PASSWORD_TOKEN}
      aws:
        command: node
        args:
          - /Users/huayang/.nvm/versions/node/v22.15.0/lib/node_modules/aws-mcp/dist/index.js
        env:
          AWS_PROFILE: ${AWS_PROFILE:-default}
          AWS_REGION: ${AWS_REGION:-us-west-2}
  dev-alex:
    project: agents
    work_stream: dev
    template: dev
    role: 开发工程师
    description: 负责技术方案设计、代码实现和开发测试
    dispatchable: true
    add_dirs:
      - .
      - ${WORKSPACE_DIR}/vm-mcp
      - ${WORKSPACE_DIR}/test-projects
  qa-lucy:
    project: agents
    work_stream: qa
    template: qa
    role: QA 工程师
    description: 负责 E2E 测试和需求一致性验证
    dispatchable: true
    add_dirs:
      - .
      - ${WORKSPACE_DIR}/vm-mcp
      - ${WORKSPACE_DIR}/test-projects
  # Personal agent (#497): handles Personal workspace tickets only.
  # Personal MCPs are scoped here under extra_mcp_servers — they MUST NOT
  # be added to the top-level mcp_servers: dict, which would auto-load them
  # into every v1 work agent (see claude.md pitfall #13).
  assistant-aria:
    project: agents
    work_stream: personal
    template: assistant
    role: 生活助理
    description: Human 的个人事务助理 — 私人邮件 / 日历 / Drive / iMessage / 生活杂事 (Personal workspace only)
    dispatchable: true
    add_dirs:
      - .
    extra_mcp_servers:
      google_personal:
        # Gmail + Calendar + Drive via taylorwilsdon/google_workspace_mcp.
        # OAuth refresh token cached at ~/.google_workspace_mcp/credentials/<gmail>.json.
        # See projects/agent-hub/skills/google-personal-mcp/SKILL.md for one-time setup.
        command: uvx
        args:
          - workspace-mcp
          - --single-user
          - --permissions
          - gmail:full
          - drive:readonly
          - calendar:full
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_PERSONAL_OAUTH_CLIENT_ID}
          GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_PERSONAL_OAUTH_CLIENT_SECRET}
          OAUTHLIB_INSECURE_TRANSPORT: "1"
      imessage_personal:
        # macOS Messages via services/imessage-mcp (read chat.db + osascript send).
        # Requires Full Disk Access on the host terminal process.
        # See services/imessage-mcp/README.md for FDA setup.
        command: uv
        args:
          - "--directory"
          - "{ROOT_DIR}/services/imessage-mcp"
          - run
          - imessage-mcp
      wechat_personal:
        # WeChat for Mac via services/wechat-mcp (pure osascript UI automation).
        # Per Human 4/26 decision (#502): pure AppleScript — no DB read, no
        # protocol implementation — to keep account-ban risk near zero on
        # Human's main account. Requires Accessibility + Automation
        # permissions on the host terminal process.
        # See services/wechat-mcp/README.md for permission setup.
        command: uv
        args:
          - "--directory"
          - "{ROOT_DIR}/services/wechat-mcp"
          - run
          - wechat-mcp
