    description: 负责 Trading 项目的策略评估、回测分析和股票池管理
    dispatchable: true
    add_dirs:
      - /Users/huayang/code/trading
    schedule:
      interval_hours: 24
      offset_hours: 6
      prompt: "定时唤醒：请检查 Trading 项目状态。1) 用 get_inbox 检查未读消息 2) 用 list_tickets 检查待办任务 3) 检查策略表现和 GitHub Actions 执行日志（gh run list）4) 分析是否需要调整策略或股票池 5) 如有改动需求，创建 agent:human ticket 等待审批。"
