tmux_session: agents

leantime:
  url: ${LEANTIME_URL:-http://localhost:9090}
  api_key: ${LEANTIME_API_KEY}
  project_id: 3
  user_id: 1
  user_email: ${LEANTIME_USER_EMAIL}

# Daemon config: central agents-mcp process that all agents connect to via proxy.
# Start daemon: uv run --directory services/agents-mcp agents-mcp --daemon --port 8765
daemon:
  host: 127.0.0.1
  port: 8765

# MCP servers spawned per-agent by Claude Code.
# In daemon mode, agents use the proxy to connect to the central daemon.
# In direct mode (daemon not configured), agents spawn the full server.
mcp_servers:
  agents:
    command: uv
    args:
      - run
      - --directory
      - "{ROOT_DIR}/services/agents-mcp"
      - agents-mcp-proxy
  agent-hub:
    command: "${VM_MCP_DIR}/.venv/bin/python"
    args:
      - "-m"
      - agent_hub
    env:
      VMWARE_API_URL: ${VMWARE_API_URL:-http://localhost:8697}
      VMWARE_USERNAME: ${VMWARE_USERNAME}
      VMWARE_PASSWORD: ${VMWARE_PASSWORD}
      SSH_KEY_PATH: ${SSH_KEY_PATH:-~/.ssh/id_ed25519}
      SSH_USERNAME: ${SSH_USERNAME:-root}

# Daily journal: all agents write a work summary at the configured time.
# Stagger avoids dispatching all agents simultaneously.
daily_journal:
  time: "01:00"
  stagger_minutes: 5

# Staleness detection: when an agent is idle but has in_progress tickets
# older than threshold, dispatch with a targeted message to complete delivery.
staleness:
  threshold_minutes: 30

# Agent name pool (pick from here when adding new agents).
# Used: kevin, alex, lucy, emma, oliver, sophia, sarah, lisa, jack, noah, mia, liam, chloe, james
name_pool: [lily, ethan, grace, ryan, zoe, max, aria, sam, leo, ruby, finn, ivy]

# Agent definitions.
# Each agent has a unique human-name ID (e.g. qa-lucy, dev-alex).
# 'template' points to the template directory under agents/<template>/.
# To add another QA agent, just add a new entry like qa-david with template: qa.
agents:
  admin:
    project: agents
    work_stream: admin
    role: 管理员
    description: 负责全局配置、Skill 管理和 Agent 重启
    dispatchable: true
    add_dirs:
      - .
  inspector:
    project: agents
    work_stream: admin
    role: 系统巡检员
    description: 每日自动检查所有 Agent 的健康状态和行为问题
    dispatchable: true
    add_dirs:
      - .
    schedule:
      interval_hours: 24
      offset_hours: 2
      prompt: "定时唤醒：请执行每日系统巡检。1) 用 get_inbox 检查未读消息 2) 使用 /inspect-agents skill 执行完整的 Agent 行为检查 3) 将检查报告保存到 journal 4) 对发现的问题创建修复 ticket 5) 重大问题通过 send_message 通知 admin。"
  product-kevin:
    project: agents
    work_stream: product
    template: product
    role: 产品经理
    description: 负责需求分析、任务分发和最终验收
    dispatchable: true
    add_dirs:
      - ${VM_MCP_DIR}
      - ${TEST_PROJECTS_DIR}
  dev-alex:
    project: agents
    work_stream: dev
    template: dev
    role: 开发工程师
    description: 负责技术方案设计、代码实现和开发测试
    dispatchable: true
    add_dirs:
      - ${VM_MCP_DIR}
      - ${TEST_PROJECTS_DIR}
  dev-emma:
    project: agents
    work_stream: dev
    template: dev
    role: 开发工程师
    description: 负责技术方案设计、代码实现和开发测试
    dispatchable: true
    add_dirs:
      - ${VM_MCP_DIR}
      - ${TEST_PROJECTS_DIR}
  qa-lucy:
    project: agents
    work_stream: qa
    template: qa
    role: QA 工程师
    description: 负责 E2E 测试和需求一致性验证
    dispatchable: true
    add_dirs:
      - ${VM_MCP_DIR}
      - ${TEST_PROJECTS_DIR}
  qa-oliver:
    project: agents
    work_stream: qa
    template: qa
    role: QA 工程师
    description: 负责 E2E 测试和需求一致性验证
    dispatchable: true
    add_dirs:
      - ${VM_MCP_DIR}
      - ${TEST_PROJECTS_DIR}
  user-sophia:
    project: agents
    work_stream: user
    template: user
    role: 用户体验测试员
    description: 以用户视角使用 Agent-Hub，构思项目并在隔离环境中测试完整工作流
    dispatchable: true
    add_dirs:
