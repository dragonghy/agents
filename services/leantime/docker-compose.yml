services:
  leantime_db:
    image: mysql:8.4
    container_name: leantime_db
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-leantime}
      MYSQL_USER: ${MYSQL_USER:-lean}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leantime-net

  leantime:
    image: leantime/leantime:latest
    container_name: leantime
    restart: unless-stopped
    ports:
      - "${LEAN_PORT:-9090}:8080"
    environment:
      LEAN_DB_HOST: leantime_db
      LEAN_DB_USER: ${MYSQL_USER:-lean}
      LEAN_DB_PASSWORD: ${MYSQL_PASSWORD}
      LEAN_DB_DATABASE: ${MYSQL_DATABASE:-leantime}
      LEAN_SESSION_PASSWORD: ${LEAN_SESSION_PASSWORD}
      LEAN_SITENAME: "Agents Project Management"
      LEAN_LANGUAGE: "zh-CN"
      LEAN_RATELIMIT_GENERAL: 10000
      LEAN_RATELIMIT_API: 10000
      LEAN_RATELIMIT_AUTH: 10000
    volumes:
      - public_userfiles:/var/www/html/public/userfiles
      - userfiles:/var/www/html/userfiles
      - ./plugins:/var/www/html/app/Plugins
      - logs:/var/www/html/storage/logs
    depends_on:
      leantime_db:
        condition: service_healthy
    networks:
      - leantime-net

volumes:
  db_data:
  public_userfiles:
  userfiles:
  logs:

networks:
  leantime-net:
    driver: bridge
